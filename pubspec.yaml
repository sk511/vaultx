name: vaultx
description: "VaultX — Your most secure digital vault. Military-grade encryption, biometric lock, breach scanner, and built-in 2FA."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Crypto ────────────────────────────────────────────────────
  pointycastle: ^3.9.1
  crypto: ^3.0.3
  convert: ^3.1.1

  # ── Secure Storage ────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Biometrics ────────────────────────────────────────────────
  local_auth: ^2.3.0

  # ── Firebase ──────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # ── Google Sign-In (native account picker — no browser redirect) ──
  google_sign_in: ^6.2.2

  # ── State ─────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Utilities ─────────────────────────────────────────────────
  uuid: ^4.5.0
  http: ^1.2.2

  # ── UI ────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Haptics ───────────────────────────────────────────────────
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
